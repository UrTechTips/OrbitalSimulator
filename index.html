<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Simulation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1 class="heading">Orbital Simulation</h1>
            <p id="debug">A <s>simple</s> orbital simulation using JavaScript and Canvas.</p>
            
            <div class="controls" id="controls">
                <button id="pause-btn">Pause</button>
                <button id="reset-btn">Reset</button>
                <!-- Slider for time speed -->
                <label class="timeLabel" for="time-scale">Time Speed:</label>
                <input type="range" class="timeScale" id="time-scale" min="0.5" max="2.5" step="0.1" value="1">
            </div>

            <div class="bodies">
                <h2>Bodies</h2>
                <ul class="body-list" id="body-list">
                    <!-- Body details will be populated here -->
                </ul>
            </div>
        </div>
        <canvas id="canvas"></canvas>
        <h3 class="time" id="time">Year: 0</h3>
    </div>
    <script type="module" src="./scripts/main.js"></script>
</body>
</html>
